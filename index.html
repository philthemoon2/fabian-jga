<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0d0b09">
<title>Fabians JGA · Stunden-Challenge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0d0b09; --bg2:#16120d; --card:#1d1813;
    --gold:#f5b21a; --gold-soft:#ffd877; --red:#e2001a;
    --cream:#f3e7cf; --muted:#9a8c74; --line:rgba(245,178,26,.18);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    font-family:'Inter',system-ui,-apple-system,sans-serif;
    background:
      radial-gradient(120% 80% at 50% -10%, #2a2013 0%, transparent 55%),
      radial-gradient(100% 60% at 50% 110%, #1a0a0c 0%, transparent 55%),
      var(--bg);
    color:var(--cream); min-height:100dvh;
    display:flex;flex-direction:column;align-items:center;
    padding:max(18px,env(safe-area-inset-top)) 18px max(22px,env(safe-area-inset-bottom));
    overflow-x:hidden;
  }
  .wrap{width:100%;max-width:520px;display:flex;flex-direction:column;flex:1;gap:16px}

  header{text-align:center;padding-top:6px}
  .kicker{font-size:12px;letter-spacing:.32em;text-transform:uppercase;color:var(--gold);font-weight:800}
  h1{font-family:'Anton',sans-serif;font-size:clamp(34px,11vw,52px);line-height:.92;
     letter-spacing:.01em;margin-top:6px;text-transform:uppercase;
     background:linear-gradient(180deg,#fff 0%,var(--gold-soft) 55%,var(--gold) 100%);
     -webkit-background-clip:text;background-clip:text;color:transparent}
  .clock{display:flex;align-items:baseline;justify-content:center;gap:10px;margin-top:10px}
  .clock .time{font-family:'Anton',sans-serif;font-size:clamp(40px,15vw,64px);letter-spacing:.04em;color:#fff;font-variant-numeric:tabular-nums}
  .clock .sec{font-family:'Anton',sans-serif;font-size:clamp(20px,7vw,30px);color:var(--gold);font-variant-numeric:tabular-nums}
  .sub{margin-top:6px;font-size:13px;color:var(--muted);font-weight:600}

  .card{
    position:relative;background:linear-gradient(180deg,var(--card),var(--bg2));
    border:1px solid var(--line);border-radius:22px;padding:26px 22px 24px;
    box-shadow:0 24px 60px -30px rgba(0,0,0,.9), inset 0 1px 0 rgba(255,255,255,.04);
    flex:1;display:flex;flex-direction:column;justify-content:center;text-align:center;
    min-height:300px;overflow:hidden;
  }
  .card::before{content:"";position:absolute;inset:0;border-radius:22px;
    background:radial-gradient(80% 50% at 50% 0%, rgba(245,178,26,.10), transparent 70%);pointer-events:none}
  .slot{display:inline-flex;align-items:center;gap:8px;align-self:center;
    background:rgba(245,178,26,.12);border:1px solid var(--line);color:var(--gold-soft);
    font-weight:800;font-size:12px;letter-spacing:.12em;text-transform:uppercase;
    padding:7px 14px;border-radius:999px}
  .emoji{font-size:clamp(46px,16vw,68px);line-height:1;margin:16px 0 8px;filter:drop-shadow(0 6px 18px rgba(0,0,0,.5))}
  .task-title{font-family:'Anton',sans-serif;font-size:clamp(28px,9vw,42px);line-height:1.02;
    text-transform:uppercase;letter-spacing:.01em;color:#fff;margin-bottom:12px}
  .task-desc{font-size:clamp(15px,4.2vw,18px);line-height:1.5;color:var(--cream);opacity:.92;max-width:34ch;margin:0 auto}
  .card.swap{animation:pop .45s cubic-bezier(.2,.9,.25,1)}
  @keyframes pop{0%{opacity:0;transform:translateY(14px) scale(.97)}100%{opacity:1;transform:none}}

  .next{display:flex;align-items:center;justify-content:space-between;gap:12px;
    background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:14px 18px}
  .next .lbl{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-weight:800}
  .next .val{font-family:'Anton',sans-serif;font-size:26px;color:var(--gold);font-variant-numeric:tabular-nums;letter-spacing:.04em}
  .progress{height:6px;border-radius:999px;background:rgba(255,255,255,.07);overflow:hidden}
  .progress > i{display:block;height:100%;width:0;border-radius:999px;
    background:linear-gradient(90deg,var(--red),var(--gold));transition:width .9s linear}

  .penalty{display:flex;align-items:center;justify-content:center;gap:10px;text-align:center;
    background:linear-gradient(180deg,rgba(226,0,26,.16),rgba(226,0,26,.05));
    border:1px solid rgba(226,0,26,.35);border-radius:16px;padding:14px 16px;
    font-weight:800;font-size:14px;color:#ffd0d0}
  .penalty .beer{font-size:22px;animation:tilt 2.4s ease-in-out infinite}
  @keyframes tilt{0%,100%{transform:rotate(-8deg)}50%{transform:rotate(8deg)}}

  footer{text-align:center;color:var(--muted);font-size:11px;letter-spacing:.08em;padding-top:2px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="kicker">Junggesellenabschied</div>
    <h1>Fabys JGA<br>Challenge</h1>
    <div class="clock"><span class="time" id="clk">--:--</span><span class="sec" id="sec">00</span></div>
    <div class="sub" id="phaseSub">Start: morgen, 9:00 Uhr</div>
  </header>

  <div class="card" id="card">
    <span class="slot" id="slot">Aufgabe</span>
    <div class="emoji" id="emoji">🍺</div>
    <div class="task-title" id="title">Lädt…</div>
    <div class="task-desc" id="desc"></div>
  </div>

  <div class="progress" id="progWrap"><i id="prog"></i></div>

  <div class="next" id="nextRow">
    <span class="lbl" id="nextLbl">Start in</span>
    <span class="val" id="nextVal">--:--</span>
  </div>

  <div class="penalty"><span class="beer">🍺</span><span>Versagt oder Fehler gemacht? → Ein Kölsch exen!</span></div>

  <footer>Es zählt die Uhrzeit deines Handys · Prost 🍻</footer>
</div>

<script>
  const HOUR = 60 * 60 * 1000;
  // Monat ist 0-basiert -> 5 = Juni. Tag 1 = 19.06., Tag 2 = 20.06.
  const mk = (y,mo,d,h,e,t,desc) => ({start:new Date(y,mo,d,h,0,0).getTime(), e, t, d:desc});

  // Fester, geheimer Stundenplan (auf allen Handys identisch). Reihenfolge = Überraschung.
  const SLOTS = [
    // --- Tag 1 (im Auto bis ~11, danach im Haus) ---
    mk(2026,5,19, 9,"🙆","Arm auf dem Kopf",   "Ein Arm (egal welcher) bleibt die ganze Stunde auf dem Kopf."),
    mk(2026,5,19,10,"🗣️","Dritte Person",       "Rede über dich nur in der dritten Person: „Fabian hat Durst.“"),
    mk(2026,5,19,11,"🤚","Hand in der Tasche",  "Eine Hand bleibt die ganze Stunde in der Hosentasche."),
    mk(2026,5,19,12,"🔙","Nur rückwärts",       "Du darfst dich nur noch rückwärts fortbewegen. Jeder Schritt nach vorne zählt."),
    mk(2026,5,19,13,"🚫","Kein „Ja“",           "Du darfst eine Stunde lang kein einziges Mal „Ja“ sagen."),
    mk(2026,5,19,14,"💪","100 Liegestütze",     "100 Liegestütze, frei verteilt über die Stunde. Am Ende müssen alle stehen."),
    mk(2026,5,19,15,"🇬🇧","Nur Englisch",        "Du sprichst nur noch Englisch. Every single word. No German."),
    mk(2026,5,19,16,"🏷️","Spitznamen",          "Niemand wird beim echten Namen genannt – jeder kriegt von dir einen Spitznamen, der gilt."),
    mk(2026,5,19,17,"🏋️","5× 1 Min Plank",      "Fünfmal eine Minute Plank, über die Stunde verteilt. Du teilst dir's selbst ein."),
    mk(2026,5,19,18,"🤫","Nur flüstern",        "Du darfst nur noch flüstern. Kein lautes Wort."),
    mk(2026,5,19,19,"🦵","150 Kniebeugen",      "150 Kniebeugen, frei verteilt über die Stunde."),
    mk(2026,5,19,20,"🚫","Kein „Nein“",         "Du darfst eine Stunde lang kein einziges Mal „Nein“ sagen."),
    mk(2026,5,19,21,"📱","Handy = Hampelmänner","Bei jeder hörbaren Handy-Benachrichtigung sofort 5 Hampelmänner."),
    mk(2026,5,19,22,"❓","Nur Gegenfragen",     "Jede Frage darfst du nur mit einer Gegenfrage beantworten."),
    mk(2026,5,19,23,"⛔","Weder Ja noch Nein",  "Beide Wörter komplett verboten: kein „Ja“, kein „Nein“."),
    // --- Nachtpause 00:00 → 09:00 ---
    // --- Tag 2 ---
    mk(2026,5,20, 9,"🎩","„Sir“ / „Eure Hoheit“","Du sprichst jeden nur noch mit „Sir“ oder „Eure Hoheit“ an."),
    mk(2026,5,20,10,"🤐","Komplett stumm",      "Kein Wort über die Lippen – eine Stunde absolutes Schweigen."),
    mk(2026,5,20,11,"🍺","Kölsch in der Hand",  "Dein Kölsch darf nie abgestellt werden – immer in der Hand.")
  ];

  const pad = n => String(n).padStart(2,"0");
  const hhmm = ms => { const d=new Date(ms); return pad(d.getHours())+":"+pad(d.getMinutes()); };
  const cdown = ms => {
    let s = Math.max(0, Math.floor(ms/1000));
    const h = Math.floor(s/3600); s%=3600;
    const m = Math.floor(s/60); s%=60;
    return (h>0? pad(h)+":" : "") + pad(m)+":"+pad(s);
  };
  const $ = id => document.getElementById(id);

  function locate(now){
    if(now < SLOTS[0].start) return {phase:"before"};
    const last = SLOTS[SLOTS.length-1];
    if(now >= last.start + HOUR) return {phase:"after"};
    for(let i=0;i<SLOTS.length;i++){
      if(now < SLOTS[i].start) return {phase:"pause", next:SLOTS[i].start};
      if(now < SLOTS[i].start + HOUR) return {phase:"active", idx:i};
    }
    return {phase:"after"};
  }

  let lastSig = "";

  function tick(){
    const now = Date.now();
    const d = new Date(now);
    $("clk").textContent = pad(d.getHours())+":"+pad(d.getMinutes());
    $("sec").textContent = pad(d.getSeconds());

    const loc = locate(now);
    const sig = loc.phase + ":" + (loc.idx!=null?loc.idx:(loc.next||""));

    if(sig !== lastSig){
      lastSig = sig;
      const card = $("card");
      if(loc.phase === "before"){
        $("slot").textContent = "Gleich geht's los";
        $("emoji").textContent = "⏳";
        $("title").textContent = "Bald geht's los!";
        $("desc").textContent  = "Die erste Aufgabe startet morgen um 9:00 Uhr. Haltet euch bereit.";
        $("phaseSub").textContent = "Start: morgen, 9:00 Uhr";
        $("nextLbl").textContent  = "Start in";
        $("nextRow").style.display = "flex";
        $("progWrap").style.display = "none";
      } else if(loc.phase === "pause"){
        $("slot").textContent = "Nachtpause";
        $("emoji").textContent = "😴";
        $("title").textContent = "Nachtpause";
        $("desc").textContent  = "Weiter geht's um 9:00 Uhr. Erstmal Schlaf – bzw. das, was davon übrig ist. 🍻";
        $("phaseSub").textContent = "Pause – weiter um 9:00 Uhr";
        $("nextLbl").textContent  = "Weiter in";
        $("nextRow").style.display = "flex";
        $("progWrap").style.display = "none";
      } else if(loc.phase === "after"){
        $("slot").textContent = "Durchgespielt";
        $("emoji").textContent = "🏆";
        $("title").textContent = "Geschafft!";
        $("desc").textContent  = "Alle Aufgaben durch. Fabian hat überlebt (mehr oder weniger). PROST! 🍻";
        $("phaseSub").textContent = "Alle Aufgaben erledigt";
        $("nextRow").style.display = "none";
        $("progWrap").style.display = "none";
      } else { // active
        const s = SLOTS[loc.idx];
        $("slot").textContent  = "Aufgabe "+(loc.idx+1)+"  ·  "+hhmm(s.start)+"–"+hhmm(s.start+HOUR);
        $("emoji").textContent = s.e;
        $("title").textContent = s.t;
        $("desc").textContent  = s.d;
        $("phaseSub").textContent = "Aufgabe "+(loc.idx+1)+" läuft";
        const isLast = loc.idx === SLOTS.length-1;
        const contiguous = !isLast && SLOTS[loc.idx+1].start === s.start + HOUR;
        $("nextLbl").textContent = isLast ? "Ende in" : (contiguous ? "Nächste Aufgabe in" : "Pause in");
        $("nextRow").style.display = "flex";
        $("progWrap").style.display = "block";
      }
      card.classList.remove("swap"); void card.offsetWidth; card.classList.add("swap");
    }

    // Countdown / Fortschritt jede Sekunde
    if(loc.phase === "before"){
      $("nextVal").textContent = cdown(SLOTS[0].start - now);
    } else if(loc.phase === "pause"){
      $("nextVal").textContent = cdown(loc.next - now);
    } else if(loc.phase === "active"){
      const s = SLOTS[loc.idx];
      const into = now - s.start;
      $("nextVal").textContent = cdown(HOUR - into);
      $("prog").style.width = (into/HOUR*100).toFixed(1)+"%";
    }
  }

  tick();
  setInterval(tick, 1000);
</script>
</body>
</html>
